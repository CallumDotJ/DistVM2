<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Page</title>
    <link rel="stylesheet" href="/submit-app/style.css">
    <script src="/submit-app/script.js" defer></script>
</head>

<body style="background-color: black; color: white; text-align: center; font-family: Arial, sans-serif;">
    <div class="divClass">
        <form id="submitForm">
            <label>
                Setup
                <input id="setupInput" name="setup" type="text" required minlength="3" />
            </label>

            <label>
                Punchline
                <input id="punchlineInput" name="punchline" type="text" required minlength="3" />
            </label>

            <label>
                <input type="checkbox" id="useNewType" />
                 Add a new joke type
            </label>

            <div id="newTypeWrapper" style="display:none;">
               <label>
                New Type
                <input id="newTypeInput" name="newType" type="text" minlength="3" />
               </label>
            </div>

              

            <div>
                <p>Select Joke Type:</p>
                <select id="jokeTypeSelect" >
                    <option value="">Select a type</option>
                </select>
            </div>

            <button type="submit">
                Submit Joke
            </button>
            
            
            

            <p id="message"></p>
        </form>
    </div>
</body>

</html>
